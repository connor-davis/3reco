# =============================================================================
#  3reco – Docker Compose
#
#  Services:
#    frontend          React 19 + Vite frontend
#    docs              Documentation site
#    convex-backend    Convex self-hosted backend  (ports 3210 / 3211)
#    convex-dashboard  Convex admin dashboard      (port 6791)
#
#  Required env vars – copy .env.example to .env and fill in your values.
# =============================================================================

services:

  # ──────────────────────────────────────────────────────────────────────────
  # React 19 + Vite frontend
  #   Built at image-build time with Bun.
  #   VITE_CONVEX_URL is baked into the JS bundle – rebuild the image whenever
  #   the Convex backend URL changes.
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./3reco
      dockerfile: Dockerfile
      args:
        VITE_CONVEX_URL: ${VITE_CONVEX_URL}
        VITE_CONVEX_SITE_URL: ${VITE_CONVEX_SITE_URL}
    ports:
      - "127.0.0.1:3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # Documentation site
  #   Built at image-build time with Bun. No runtime env vars required.
  # ──────────────────────────────────────────────────────────────────────────
  docs:
    build:
      context: ./3reco/documentation
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3001:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # Convex self-hosted backend
  #   Exposes:
  #     3210 → Convex backend API  (CONVEX_CLOUD_ORIGIN)
  #     3211 → Convex HTTP actions / site proxy  (CONVEX_SITE_ORIGIN)
  #   Data persisted in Docker volume `convex-data`.
  # ──────────────────────────────────────────────────────────────────────────
  convex-backend:
    image: ghcr.io/get-convex/convex-backend:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    environment:
      # Required: unique name and 64-byte hex secret for this deployment
      - INSTANCE_NAME=${INSTANCE_NAME}
      - INSTANCE_SECRET=${INSTANCE_SECRET}
      # Public origin URLs (used by Convex for CORS and auth token issuer)
      - CONVEX_CLOUD_ORIGIN=${CONVEX_CLOUD_ORIGIN}
      - CONVEX_SITE_ORIGIN=${CONVEX_SITE_ORIGIN}
      # Better Auth backend configuration
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - SITE_URL=${SITE_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - AUTH_FROM_EMAIL=${AUTH_FROM_EMAIL}
      # Allow HTTP (set to false once HTTPS certs are in place)
      - DO_NOT_REQUIRE_SSL=true
      # JVM heap – increase on servers with more RAM
      - RUST_LOG=${RUST_LOG:-info}
      # ── Optional: external SQL database instead of built-in SQLite ──────
      # - POSTGRES_URL=${POSTGRES_URL}
      # - MYSQL_URL=${MYSQL_URL}
      # ── Optional: S3-compatible file storage ────────────────────────────
      # - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      # - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # - AWS_REGION=${AWS_REGION}
      # - S3_STORAGE_FILES_BUCKET=${S3_STORAGE_FILES_BUCKET}
    volumes:
      - convex-data:/convex/data
    ports:
      - "127.0.0.1:3210:3210"
      - "127.0.0.1:3211:3211"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3210/version || wget -qO- http://localhost:3210/version > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      start_period: 60s
      retries: 10
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────
  # Convex admin dashboard
  #   Access at:  http://convex-dashboard.{SERVER_NAME}
  #   Log in with the admin key generated by:
  #     docker compose exec convex-backend ./generate_admin_key.sh
  # ──────────────────────────────────────────────────────────────────────────
  convex-dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=${CONVEX_CLOUD_ORIGIN}
    depends_on:
      convex-backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:6791:6791"
    restart: unless-stopped

# =============================================================================
#  Named volumes
# =============================================================================
volumes:
  # Persistent Convex backend data (SQLite DB + uploaded files)
  convex-data:
